name: CI

on:
  push:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Require linked issue
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const body = context.payload.pull_request?.body || "";
            const match = body.match(/\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)\b/i);
            if (!match) {
              core.setFailed("PR body must include a closing issue reference such as 'Closes #123'.");
              return;
            }

            const issue_number = Number(match[1]);
            const { owner, repo } = context.repo;
            const issue = await github.rest.issues.get({ owner, repo, issue_number });

            if (issue.data.pull_request) {
              core.setFailed(`Referenced #${issue_number} is a pull request, not an issue.`);
              return;
            }

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run unified checks
        run: bash scripts/check.sh
